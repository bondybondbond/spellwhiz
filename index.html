<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <title>SpellWhiz</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="icon" type="image/png" href="icon.png" />
  </head>
  <body>
    <div id="app-wrapper">
      <div id="rotate-message">
        <div style="font-size: 50px">📲</div>
        <h2 style="color: white; margin: 20px">Please Rotate Your Phone</h2>
        <p>SpellWhiz works best in Portrait mode.</p>
      </div>

      <div id="splash-screen">
        <div class="splash-art">
          <img src="wizard-mascot.jpg" alt="Wizard Mascot" class="mascot-img" />
        </div>

        <div class="splash-content">
          <h1 class="logo-text">SpellWhiz</h1>
          <div class="logo-sub">The Magical Spelling Game</div>
          <button class="btn-start-splash" onclick="enterApp()">
            TAP TO START
          </button>
        </div>
      </div>

      <canvas id="confetti" class="hidden"></canvas>

      <div id="app">
        <div id="perfect-screen" class="hidden">
          <img
            src="wizard-perfect.jpg"
            class="perfect-img"
            alt="Perfect Score Wizard"
          />
        </div>

        <div id="setup-screen" class="hidden">
          <div id="setup-box">
            <h2 style="color: var(--brand-color)">📝 Spelling Lists</h2>

            <div id="list-controls">
              <select
                id="list-select"
                onchange="switchList(this.value)"
              ></select>
            </div>
            <div id="list-actions">
              <button class="btn-action btn-new" onclick="createNewList()">
                + New List
              </button>
              <button class="btn-action btn-edit" onclick="renameList()">
                ✎ Rename
              </button>
              <button class="btn-action btn-del" onclick="deleteList()">
                🗑 Delete
              </button>
            </div>

            <div id="input-list-container">
              <div id="input-list"></div>
              <button class="btn-add" id="btn-add" onclick="addNewRow()">
                + Add Another Word
              </button>
            </div>

            <button class="btn-primary" onclick="initGame()">
              Start Game ▶️
            </button>
          </div>
        </div>

        <div id="game-screen" class="hidden">
          <button id="menu-btn" onclick="returnToMenu()">↩️ Menu</button>
          <div id="progress-container">
            <div id="progress-fill"></div>
            <div id="progress-text">0/0</div>
          </div>

          <div id="game-container">
            <div id="top-area">
              <span id="visual-emoji" class="emoji-display">🗨️</span>
              <button id="btn-hear" onclick="speakCurrentWord()">
                🔊 HEAR WORD
              </button>
              <div class="hint-text">(Press SPACE BAR to hear)</div>
            </div>

            <div id="block-area"></div>

            <div id="keyboard-area"></div>
          </div>
        </div>

        <div id="result-screen" class="hidden">
          <!-- Word Clinic Overlay -->
          <div id="spell-fixer" class="hidden">
            <div class="fixer-card">
              <div class="fixer-header">
                <span class="fixer-icon">🪄</span>
                <h2>Spell Fixer</h2>
                <span id="fixer-progress">1 / 2</span>
              </div>
              
              <div id="fixer-emoji" class="fixer-emoji">😢</div>
              
              <div class="fixer-compare">
                <div class="fixer-box correct" id="fixer-correct-box" onclick="speakFixerWord('correct')">
                  <div class="fixer-label">✓ Correct</div>
                  <div id="fixer-correct" class="fixer-word">CRIED</div>
                  <div class="fixer-tap-hint">tap to hear</div>
                </div>
                
                <div class="fixer-box wrong" id="fixer-wrong-box" onclick="speakFixerWord('wrong')">
                  <div class="fixer-label">✗ You typed</div>
                  <div id="fixer-typed" class="fixer-word">CIRID</div>
                  <div class="fixer-tap-hint">tap to hear</div>
                </div>
              </div>
              
              <div id="fixer-slots" class="fixer-slots">
                <!-- Slots generated by JS -->
              </div>
              
              <div id="fixer-blocks" class="fixer-blocks">
                <!-- Letter blocks generated by JS -->
              </div>
            </div>
          </div>
          <div id="score-card">
            <div class="card-header">
              <div>
                <h1 style="margin: 0; font-size: 24px">Game Over!</h1>
                <h2
                  id="final-score"
                  style="margin: 5px 0 0 0; font-size: 18px; color: #666"
                >
                  Score: 0/0
                </h2>
              </div>
            </div>
            <div id="result-message"></div>
            <div id="result-list"></div>
            <div id="fixer-btn-container" class="hidden" style="flex-shrink: 0;"></div>
            <div style="margin-top: 12px; flex-shrink: 0">
              <button class="btn-primary" onclick="returnToMenu()">Done</button>
            </div>
          </div>
        </div>
      </div>
    </div>
    <script src="emojiData.js"></script>
    <script src="game.js"></script>
  </body>
</html>
